name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        description: Baixa o código fonte do repositório no runner do GitHub Actions.

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
        description: Configura o ambiente do Node.js v20 e ativa o cache para acelerar instalações futuras.

      - name: Install dependencies
        run: npm ci
        description: Instala de forma limpa as dependências definidas no package-lock.json.

      - name: Generate Prisma Client
        run: npx prisma generate
        description: Gera o Prisma Client com os tipos necessários no caminho customizado do repositório.

      - name: Run linter
        run: npm run lint
        description: Valida as regras de lint do ESLint aplicadas ao projeto.

      - name: Compile project
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET: dummy_secret_for_compilation_purposes
        run: npm run build
        description: Compila o projeto NestJS (TypeScript compiler) com variáveis de ambiente fictícias para satisfazer o validador.

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          JWT_SECRET: dummy_secret_for_testing_purposes
        run: npm run test
        description: Executa a suíte de testes unitários configurada com o Jest.